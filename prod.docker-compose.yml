services:
  boilerplate:
    build:
      context: .
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - .env
    expose:
      - "5050"
    volumes:
      - static_files:/static
    depends_on:
      boilerplate-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5050/api/v1/notes/alive || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - boilerplate-net

  boilerplate-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - boilerplate-net

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/home/app/src/static:ro
    depends_on:
      boilerplate:
        condition: service_healthy
    networks:
      - boilerplate-net

volumes:
  db-data:
  static_files:

networks:
  boilerplate-net:
    driver: bridge
